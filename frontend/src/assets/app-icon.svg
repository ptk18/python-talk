<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Antenna -->
  <line x1="32" y1="8" x2="32" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="6" r="3.5" fill="#7B8CDE"/>
  <!-- Head (rounded, cute) -->
  <rect x="10" y="16" width="44" height="32" rx="14" fill="white"/>
  <!-- Eyes (big, cute) -->
  <ellipse cx="23" cy="30" rx="6" ry="6.5" fill="#1C223D"/>
  <ellipse cx="41" cy="30" rx="6" ry="6.5" fill="#1C223D"/>
  <!-- Eye highlights (sparkle) -->
  <circle cx="25.5" cy="27.5" r="2.5" fill="white"/>
  <circle cx="43.5" cy="27.5" r="2.5" fill="white"/>
  <circle cx="21" cy="31" r="1" fill="white"/>
  <circle cx="39" cy="31" r="1" fill="white"/>
  <!-- Blush cheeks -->
  <ellipse cx="14" cy="35" rx="4" ry="2.5" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="50" cy="35" rx="4" ry="2.5" fill="#FFB6C1" opacity="0.6"/>
  <!-- Smile -->
  <path d="M26 38 Q32 43 38 38" stroke="#1C223D" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Ears (rounded) -->
  <circle cx="6" cy="30" r="5" fill="white"/>
  <circle cx="58" cy="30" r="5" fill="white"/>
  <circle cx="6" cy="30" r="2.5" fill="#7B8CDE"/>
  <circle cx="58" cy="30" r="2.5" fill="#7B8CDE"/>
  <!-- Body -->
  <rect x="20" y="50" width="24" height="10" rx="5" fill="white"/>
  <!-- Body buttons -->
  <circle cx="28" cy="55" r="2" fill="#7B8CDE"/>
  <circle cx="36" cy="55" r="2" fill="#7B8CDE"/>
</svg>
